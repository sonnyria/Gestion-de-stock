<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GestionStock AI</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#111827" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StockAI" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/open-box.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone pour compiler le TSX à la volée -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* Custom scrollbar for cleaner UI */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
      body {
        background-color: #111827; /* gray-900 */
        color: #f3f4f6; /* gray-100 */
        overscroll-behavior-y: none; /* Empêche le rebond élastique sur iOS */
        
        /* Comportement natif iOS */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none; /* Désactive la sélection de texte comme une app native */
        -webkit-user-select: none;
      }
      
      /* Réactiver la sélection pour les champs de saisie */
      input, textarea, [contenteditable] {
        user-select: text;
        -webkit-user-select: text;
      }

      /* Gestion des Safe Areas (Encoche iPhone) */
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .mt-safe {
        margin-top: env(safe-area-inset-top);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "react-webcam": "https://aistudiocdn.com/react-webcam@^7.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <!-- Utilisation de type="text/babel" et data-type="module" pour le support TSX -->
    <script type="text/babel" data-type="module" src="./index.tsx"></script>
  </body>
</html>
