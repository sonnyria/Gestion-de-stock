<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GestionStock AI</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#111827" />
    
    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StockAI" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/open-box.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1f2937; }
      ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
      body {
        background-color: #111827;
        color: #f3f4f6;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        user-select: none;
        -webkit-user-select: none;
      }
      input, textarea, [contenteditable] { user-select: text; -webkit-user-select: text; }
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      
      /* Animation utilitaire */
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fade-in 0.3s ease-out; }
    </style>

    <!-- Polyfill pour process.env (évite le crash "process is not defined") -->
    <script>
      window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <!-- Import Map via ESM.SH (CDN très stable pour React) -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "@google/genai": "https://esm.sh/@google/genai@0.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-webcam": "https://aistudiocdn.com/react-webcam@^7.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Gestionnaire d'erreurs global : Affiche l'erreur à l'écran au lieu d'une page bleue vide -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        const root = document.getElementById('root');
        // Si le root est vide, c'est que React n'a pas démarré
        if(root && root.innerHTML.trim() === "") {
            document.body.innerHTML = `
                <div style="padding: 20px; background: #1a1a1a; color: #ff5555; font-family: monospace; height: 100vh; box-sizing: border-box;">
                    <h2 style="margin-top:0">Erreur Critique au Démarrage</h2>
                    <p>L'application n'a pas pu charger les scripts.</p>
                    <div style="background: #000; padding: 15px; border-radius: 8px; border: 1px solid #333; overflow: auto;">
                        <strong>Message:</strong> ${message}<br/>
                        <strong>Ligne:</strong> ${lineno}<br/>
                        <strong>Source:</strong> ${source}
                    </div>
                    <p style="color: #888; font-size: 12px; margin-top: 20px;">
                        Si vous êtes sur Vercel/GitHub Pages, assurez-vous que index.tsx contient tout le code.
                    </p>
                    <button onclick="location.reload()" style="background: #333; color: white; border: none; padding: 10px 20px; margin-top: 10px; border-radius: 4px; cursor: pointer;">Rafraîchir</button>
                </div>
            `;
        }
      };
    </script>

    <!-- CHARGEMENT DU FICHIER UNIQUE -->
    <script type="text/babel" data-type="module" src="./index.tsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW failed', err));
        });
      }
    </script>
  </body>
</html>
